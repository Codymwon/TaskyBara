name: taskybara
description: "A capybara-themed To-Do app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "Assets/Taskybaraappicon.png"
  adaptive_icon_background: "#B08968"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - Assets/notask.png
    - Assets/hastask.png
    - Assets/almostdone.png
    - Assets/Alldone.png
